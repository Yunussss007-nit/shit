<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday! ✨</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --text-color: #c5c6c7;
            --accent-color: #ff4a5a;
            --glow-color: rgba(255, 74, 90, 0.6);
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
        }

        /* Floating background elements */
        .hearts {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            pointer-events: none;
        }

        .card {
            background: rgba(31, 40, 51, 0.6);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 3rem;
            border-radius: 20px;
            text-align: center;
            box-shadow: 0 0 30px var(--glow-color);
            max-width: 500px;
            animation: fadeIn 2s ease-in-out;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: #fff;
            text-shadow: 0 0 10px var(--accent-color);
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
            color: #b3b4b5;
        }

        .btn {
            background: transparent;
            border: 2px solid var(--accent-color);
            color: #fff;
            padding: 10px 25px;
            font-size: 1rem;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 0 10px var(--glow-color);
            margin-top: 20px;
        }

        .btn:hover {
            background: var(--accent-color);
            box-shadow: 0 0 25px var(--accent-color);
            transform: scale(1.05);
        }

        #surprise-output {
            margin-top: 25px;
            white-space: pre-wrap;
            font-family: monospace;
            color: #00ffcc;
            text-align: left;
            background: #000;
            padding: 15px;
            border-radius: 10px;
            display: none;
            font-size: 0.9rem;
            border: 1px solid #00ffcc;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="hearts" id="heart-container"></div>

    <div class="card">
        <h1>Happy Birthday! 🌸</h1>
        <p>To someone incredibly special. May your day be as bright, beautiful, and amazing as your smile. Thank you for just being you.</p>
        
        <button class="btn" onclick="revealSurprise()">Click for a Surprise</button>
        
        <div id="surprise-output"></div>
    </div>

    <script>
        // Create floating background particles
        function createHeart() {
            const container = document.getElementById('heart-container');
            const heart = document.createElement('div');
            heart.innerHTML = '✨';
            heart.style.position = 'absolute';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '100vh';
            heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
            heart.style.opacity = Math.random();
            heart.style.transform = `translateY(0)`;
            heart.style.transition = 'transform 6s linear, opacity 6s ease-out';
            
            container.appendChild(heart);
            
            setTimeout(() => {
                heart.style.transform = 'translateY(-105vh)';
                heart.style.opacity = '0';
            }, 50);
            
            setTimeout(() => {
                heart.remove();
            }, 6000);
        }
        setInterval(createHeart, 300);

        // Fetch the backend C++ response via Python
        async function revealSurprise() {
            const outputDiv = document.getElementById('surprise-output');
            outputDiv.style.display = 'block';
            outputDiv.innerText = 'Loading secret message...';
            
            try {
                const response = await fetch('/get-surprise');
                const data = await response.text();
                outputDiv.innerText = data;
            } catch (err) {
                outputDiv.innerText = "Error decoding message, but the sentiment remains perfect. ❤️";
            }
        }
    </script>
</body>
</html>
